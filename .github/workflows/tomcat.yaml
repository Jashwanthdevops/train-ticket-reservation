name: ci/cd pipeline to deploy to tomcat
on: 
  push:
    branches: master
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v3
      
      - name: set-up jdk
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'   # Updated Java version
      
      - name: validate with maven
        run: mvn validate

      - name: compile with maven
        run: mvn compile
      
      - name: test with maven
        run: mvn test
      
      - name: package with maven
        run: mvn clean package

      - name: verify WAR file
        run: ls -lh target/

      # SonarQube Analysis # ------------------------- 
      - name: SonarQube Scan 
        run: | 
          mvn sonar:sonar \ 
          -Dsonar.projectKey=TrainBook \ 
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \ 
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        
      - name: Configure Maven settings.xml for Nexus
        run: |
          mkdir -p ~/.m2
          cat <<EOF > ~/.m2/settings.xml
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Upload Artifact to Nexus
        run: mvn deploy -DaltDeploymentRepository=nexus::default::${{ secrets.NEXUS_REPO_URL }}
      # Deploy to Tomcat # ------------------------- 
      - name: Deploy WAR to Tomcat 
        run: | 
          curl -u ${{ secrets.TOMCAT_USERNAME }}:${{ secrets.TOMCAT_PASSWORD }} \ 
          -T target/*.war \ 
          "http://${{ secrets.TOMCAT_HOST }}:8080/manager/text/deploy?path=/TrainBook&update=true"
